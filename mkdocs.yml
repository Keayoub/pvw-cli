site_name: Purview CLI Docs
site_description: Documentation and sample catalog for pvw-cli
site_url: https://keayoub.github.io/pvw-cli/
repo_url: https://github.com/Keayoub/pvw-cli
repo_name: Keayoub/pvw-cli

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight

validation:
  links:
    not_found: ignore

nav:
  - Home: readme.md
  - Getting Started: getting-started.md
  - Entity Bulk CSV Guide: entity-bulk-csv-guide.md
  - Unified Catalog: unified-catalog.md
  - Full Documentation Catalog: documentation-catalog.md
  - Full Samples Catalog: samples-catalog.md
