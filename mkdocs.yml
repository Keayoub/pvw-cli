site_name: Purview CLI Docs
site_description: Documentation and sample catalog for pvw-cli
site_url: https://keayoub.github.io/pvw-cli/
repo_url: https://github.com/Keayoub/pvw-cli
repo_name: Keayoub/pvw-cli

theme:
  name: material
  language: en
  font:
    text: Segoe UI
    code: Cascadia Code
  palette:
    - scheme: default
      primary: teal
      accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

validation:
  links:
    not_found: ignore

nav:
  - Home: index.md
  - Start Here:
      - Getting Started: getting-started.md
      - Which Command Should I Use?: which-command-should-i-use.md
      - Common Workflows: common-workflows.md
      - Command Groups: command-groups.md
  - Core Guides:
      - Unified Catalog: unified-catalog.md
      - Quick Reference: quick-reference.md
      - Entity Bulk CSV Guide: entity-bulk-csv-guide.md
      - Bulk CSV Troubleshooting: bulk-csv-troubleshooting.md
      - Authentication Troubleshooting: authentication-troubleshooting.md
      - Performance Guide: performance-optimization-guide.md
      - Relationship Automation: relationship-automation-guide.md
      - Collections Permissions: collections-permissions.md
  - Command Families:
      - Account: commands/account/main.md
      - Entity: commands/entity/main.md
      - Glossary: commands/glossary/main.md
      - Search: commands/search/main.md
      - Scan: commands/scan/main.md
      - Relationship: commands/relationship/main.md
      - Lineage: commands/lineage/main.md
      - Management: commands/management/main.md
      - Policy Store: commands/policystore/main.md
      - Share: commands/share/main.md
      - Types: commands/types/main.md
      - Insight: commands/insight/main.md
      - Unified Catalog Commands: commands/unified-catalog.md
  - Task Guides:
      - Create Tasks: commands/task-create.md
      - Update Tasks: commands/task-update.md
      - Delete Tasks: commands/task-delete.md
      - Import Tasks: commands/task-import.md
  - Full Catalogs:
      - Documentation Catalog: documentation-catalog.md
      - Samples Catalog: samples-catalog.md
      - Templates & Downloads: templates.md

